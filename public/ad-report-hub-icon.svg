<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Professional blue gradient -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0055D4"/>
      <stop offset="100%" style="stop-color:#0066FF"/>
    </linearGradient>
    <!-- Shadow -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Shield shape -->
  <g filter="url(#iconShadow)">
    <path d="M24 2 L42 8 L42 20 C42 32 34 40 24 46 C14 40 6 32 6 20 L6 8 Z" 
          fill="url(#iconGradient)"/>
    
    <!-- Key icon -->
    <g transform="translate(24, 22)">
      <!-- Key head -->
      <circle cx="-5" cy="0" r="5" fill="none" stroke="white" stroke-width="2"/>
      <circle cx="-5" cy="0" r="2" fill="white"/>
      <!-- Key shaft -->
      <rect x="-1" y="-1.2" width="11" height="2.4" rx="1.2" fill="white"/>
      <!-- Key teeth -->
      <rect x="7" y="-1.2" width="2" height="5" rx="0.8" fill="white"/>
      <rect x="4" y="-1.2" width="1.5" height="3.5" rx="0.6" fill="white"/>
    </g>
    
    <!-- Mini chart bars -->
    <g transform="translate(30, 10)">
      <rect x="0" y="4" width="2.5" height="5" rx="0.5" fill="white" opacity="0.9"/>
      <rect x="3.5" y="2" width="2.5" height="7" rx="0.5" fill="white" opacity="0.9"/>
      <rect x="7" y="0" width="2.5" height="9" rx="0.5" fill="white" opacity="0.9"/>
    </g>
  </g>
</svg>
