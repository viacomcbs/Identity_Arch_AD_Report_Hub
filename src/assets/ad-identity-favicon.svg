<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for modern look -->
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0055D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle for favicon -->
  <circle cx="16" cy="16" r="15" fill="url(#faviconGradient)"/>
  
  <!-- Shield shape (centered) -->
  <g transform="translate(16, 16)">
    <path d="M 0 -8 L 6 -5 L 6 2 Q 6 8 3 11 Q 0 14 -3 11 Q -6 8 -6 2 L -6 -5 Z" 
          fill="white" 
          opacity="0.95"/>
    
    <!-- Key symbol inside shield -->
    <g transform="translate(0, 2)">
      <!-- Key head -->
      <circle cx="0" cy="0" r="3" fill="url(#faviconGradient)" opacity="0.95"/>
      <rect x="-1.5" y="-0.8" width="3" height="1.6" fill="url(#faviconGradient)" opacity="0.95"/>
      <!-- Key shaft -->
      <rect x="1.5" y="-0.6" width="4" height="1.2" fill="url(#faviconGradient)" opacity="0.95" rx="0.5"/>
      <!-- Key teeth -->
      <rect x="5" y="-1" width="1" height="2" fill="url(#faviconGradient)" opacity="0.95" rx="0.3"/>
    </g>
  </g>
</svg>
